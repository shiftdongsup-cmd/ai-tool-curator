name: Daily AI Tool News

on:
  schedule:
    # 17:00 KST == 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  crawl-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SLACK_CHANNEL: "#ai-tool-news"
      SCHEDULE_TIMEZONE: "Asia/Seoul"
      LOOKBACK_HOURS: "24"
      MAX_ITEMS: "12"
      REQUEST_TIMEOUT_SEC: "15"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run crawler once
        run: python crawling.py --once --require-webhook
